name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Create www folder with index.html
        run: |
          mkdir -p www
          echo '<html><body><script>window.location.href="https://my-website-sage-one-51.vercel.app";</script></body></html>' > www/index.html

      - name: Init and add Capacitor Android
        run: |
          npx cap init "GOD DOMAIN" "com.GOD.DOMAIN" --web-dir www
          npx cap add android

      - name: Build GODDOMAIN APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GOD-DOMAIN-v1.0.0-build${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
