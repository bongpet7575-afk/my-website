<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Projects</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
  </head>
  <body>
    <div id="loader">
      <div class="spinner"></div>
      <p>Loading Projects...</p>
    </div>
    <div class="card">
        <nav>
             <a href="index.html">Home</a>
             <a href="projects.html">My Projects</a>
        </nav>

      <h1>My Projects</h1>
      <p>Here are the projects I have built so far.</p>

      <div class="project-card">
        <h2>🌐 Personal Bio Website</h2>
        <p>My first ever website built with HTML and CSS. Includes a profile picture, hobbies, schedule table, and Google Translate!</p>
        <a href="https://my-website-sage-one-51.vercel.app">View Project</a>
      </div>

      <footer>
        <p>Made by Rotana Khin © 2026</p>
      </footer>

    </div>
    <audio id="clickSound" src="click.mp3"></audio>

<script>
    window.addEventListener('load', () => {
    const loader = document.getElementById('loader');
    loader.style.transition = 'opacity 0.5s ease';
    loader.style.opacity = '0';
    setTimeout(() => {
      loader.style.display = 'none';
    }, 500);
  });
  const sound = document.getElementById('clickSound');
  const links = document.querySelectorAll('a');

  links.forEach(link => {
    link.addEventListener('click', (event) => {
      event.preventDefault();
      const destination = link.href;
      sound.currentTime = 0;
      sound.play();
      setTimeout(() => {
        window.location.href = destination;
      }, 300);
    });
  });
</script>
  </body>
</html>
